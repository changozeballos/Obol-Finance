<div style="min-height:100%;display:flex;align-items:center;justify-content:center;padding:60px 40px;background:#eef1f7;font-family:'Nunito',system-ui,sans-serif;">

  <div style="position:relative;width:760px;">

    <!-- Card -->
    <div style="position:relative;height:280px;border-radius:28px;overflow:hidden;box-shadow:0 24px 48px -18px rgba(10,12,30,.55),0 6px 16px -8px rgba(10,12,30,.35);">
      <div style="position:absolute;inset:0;background-image:url(&quot;3f1059f2-a8b3-4fcb-b667-209bcad267d3&quot;);background-size:cover;background-position:center 55%;"></div>
      <div style="position:absolute;inset:0;background:linear-gradient(105deg,rgba(10,12,26,.8) 0%,rgba(10,12,26,.56) 40%,rgba(10,12,26,.15) 64%,rgba(10,12,26,0) 100%);"></div>
      <div style="position:absolute;inset:0;background:linear-gradient(0deg,rgba(10,12,26,.55) 0%,rgba(10,12,26,0) 45%);"></div>

      <!-- Content -->
      <div style="position:absolute;inset:0;padding:40px 44px;display:flex;flex-direction:column;justify-content:center;gap:14px;max-width:62%;">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="display:inline-flex;align-items:center;font-family:'Fredoka',sans-serif;font-weight:600;font-size:12px;letter-spacing:.14em;color:#fff;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.26);backdrop-filter:blur(6px);padding:6px 14px;border-radius:999px;text-transform:uppercase;">Economía</span>
          <span style="display:inline-flex;align-items:center;font-weight:700;font-size:13px;color:rgba(255,255,255,.92);background:rgba(10,12,26,.42);border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(6px);padding:6px 14px;border-radius:999px;">0/4 lecciones</span>
        </div>

        <h1 style="margin:0;font-family:'Fredoka',sans-serif;font-weight:700;font-size:42px;line-height:1.02;color:#fff;text-shadow:0 2px 14px rgba(0,0,10,.6);letter-spacing:-.01em;">Crisis y Ciclos</h1>

        <p style="margin:0;font-weight:600;font-size:16px;line-height:1.35;color:rgba(255,255,255,.9);text-shadow:0 1px 8px rgba(0,0,10,.55);max-width:320px;">Cuando la economía sube y baja</p>

        <div style="display:flex;align-items:center;gap:12px;max-width:340px;margin-top:2px;">
          <div style="position:relative;flex:1;height:9px;border-radius:999px;background:rgba(255,255,255,.28);overflow:hidden;">
            <div style="position:absolute;left:0;top:0;bottom:0;width:{{ progressPct }};border-radius:999px;background:linear-gradient(90deg,#ffe08a,#ffb24a);box-shadow:0 0 12px rgba(255,180,74,.6);"></div>
          </div>
          <span style="font-weight:800;font-size:12px;color:rgba(255,255,255,.9);white-space:nowrap;">{{ progressLabel }}</span>
        </div>
      </div>
    </div>

    <!-- Storm-taming pig, breaking out of the card for a 3D pop -->
    <img src="ebbf645e-c159-4160-9004-619bbd7d8b32" alt="Chancho domador de tormentas con bastón y rayo" style="position:absolute;right:-28px;bottom:-30px;width:360px;height:auto;pointer-events:none;filter:drop-shadow(0 18px 22px rgba(0,0,10,.5)) drop-shadow(0 4px 8px rgba(0,0,10,.35));z-index:3;">

  </div>
</div>
</x-dc>

<script type="text/x-dc" data-dc-script="" data-props="{&quot;$preview&quot;:{&quot;width&quot;:840,&quot;height&quot;:400},&quot;lessonsDone&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:0,&quot;tsType&quot;:&quot;number&quot;,&quot;min&quot;:0,&quot;max&quot;:4},&quot;lessonsTotal&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:4,&quot;tsType&quot;:&quot;number&quot;,&quot;min&quot;:1,&quot;max&quot;:12}}">
class Component extends DCLogic {
  renderVals() {
    const done = this.props.lessonsDone ?? 0;
    const total = this.props.lessonsTotal ?? 4;
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    return {
      progressPct: Math.max(pct, 4) + '%',
      progressLabel: pct + '%',
    };
  }
}
</script>
