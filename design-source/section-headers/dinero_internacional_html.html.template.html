<div style="min-height:100%;display:flex;align-items:center;justify-content:center;padding:60px 40px;background:#eef1f7;font-family:'Nunito',system-ui,sans-serif;">

  <div style="position:relative;width:760px;">

    <!-- Card -->
    <div style="position:relative;height:280px;border-radius:28px;overflow:hidden;box-shadow:0 24px 48px -18px rgba(40,30,60,.45),0 6px 16px -8px rgba(40,30,60,.3);">
      <!-- Background image -->
      <div style="position:absolute;inset:0;background-image:url(&quot;6a223347-925e-4949-965c-0a273c877e08&quot;);background-size:cover;background-position:center 38%;"></div>
      <!-- Legibility scrim -->
      <div style="position:absolute;inset:0;background:linear-gradient(105deg,rgba(30,22,45,.72) 0%,rgba(30,22,45,.5) 38%,rgba(30,22,45,.12) 62%,rgba(30,22,45,0) 100%);"></div>
      <div style="position:absolute;inset:0;background:linear-gradient(0deg,rgba(30,22,45,.45) 0%,rgba(30,22,45,0) 45%);"></div>

      <!-- Content -->
      <div style="position:absolute;inset:0;padding:40px 44px;display:flex;flex-direction:column;justify-content:center;gap:16px;max-width:62%;">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="display:inline-flex;align-items:center;font-family:'Fredoka',sans-serif;font-weight:600;font-size:12px;letter-spacing:.14em;color:#fff;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.28);backdrop-filter:blur(6px);padding:6px 14px;border-radius:999px;text-transform:uppercase;">Economía</span>
          <span style="display:inline-flex;align-items:center;font-weight:700;font-size:13px;color:rgba(255,255,255,.92);background:rgba(30,22,45,.32);border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(6px);padding:6px 14px;border-radius:999px;">0/3 lecciones</span>
        </div>

        <h1 style="margin:0;font-family:'Fredoka',sans-serif;font-weight:700;font-size:44px;line-height:1.02;color:#fff;text-shadow:0 2px 14px rgba(20,12,35,.5);letter-spacing:-.01em;">Dinero Internacional</h1>

        <div style="display:flex;align-items:center;gap:12px;max-width:340px;">
          <div style="position:relative;flex:1;height:9px;border-radius:999px;background:rgba(255,255,255,.28);overflow:hidden;">
            <div style="position:absolute;left:0;top:0;bottom:0;width:{{ progressPct }};border-radius:999px;background:linear-gradient(90deg,#ffd36b,#ff9a5a);box-shadow:0 0 12px rgba(255,180,90,.6);"></div>
          </div>
          <span style="font-weight:800;font-size:12px;color:rgba(255,255,255,.9);white-space:nowrap;">{{ progressLabel }}</span>
        </div>
      </div>
    </div>

    <!-- Pig, breaking out of the card for a 3D pop -->
    <img src="155737d0-8ad9-48ca-abaa-91419e679f73" alt="Chancho pensando en dinero" style="position:absolute;right:-14px;bottom:-10px;width:340px;height:auto;pointer-events:none;filter:drop-shadow(0 18px 22px rgba(30,20,45,.45)) drop-shadow(0 4px 8px rgba(30,20,45,.3));z-index:3;">

  </div>
</div>
</x-dc>

<script type="text/x-dc" data-dc-script="" data-props="{&quot;$preview&quot;:{&quot;width&quot;:840,&quot;height&quot;:400},&quot;lessonsDone&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:0,&quot;tsType&quot;:&quot;number&quot;,&quot;min&quot;:0,&quot;max&quot;:3},&quot;lessonsTotal&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:3,&quot;tsType&quot;:&quot;number&quot;,&quot;min&quot;:1,&quot;max&quot;:12}}">
class Component extends DCLogic {
  renderVals() {
    const done = this.props.lessonsDone ?? 0;
    const total = this.props.lessonsTotal ?? 3;
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    return {
      progressPct: Math.max(pct, 4) + '%',
      progressLabel: pct + '%',
    };
  }
}
</script>
